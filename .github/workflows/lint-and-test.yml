name: Lint and Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  autofix:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff autofix
        run: |
          for svc in user_service matching_service ranking_service notification_service bot_service; do
            ruff check --fix services/$svc/src/
            ruff format services/$svc/src/
          done

      - name: Commit fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: ruff autofix"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com

  lint:
    needs: autofix
    if: always() && (needs.autofix.result == 'success' || needs.autofix.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user_service, matching_service, ranking_service, notification_service, bot_service]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install deps
        run: pip install -r services/${{ matrix.service }}/requirements.txt ruff

      - name: Ruff lint
        run: ruff check services/${{ matrix.service }}/src/

      - name: Ruff format check
        run: ruff format --check services/${{ matrix.service }}/src/

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: dating_bot_test
          POSTGRES_USER: dating_user
          POSTGRES_PASSWORD: dating_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ranking_service deps
        run: pip install -r services/ranking_service/requirements.txt pytest pytest-asyncio

      - name: Run ranking_service tests
        env:
          DATABASE_URL: postgresql+asyncpg://dating_user:dating_pass@localhost:5432/dating_bot_test
          REDIS_DSN: redis://localhost:6379/0
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
        run: |
          cd services/ranking_service
          python -m pytest src/ -q --tb=short
