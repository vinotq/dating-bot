global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: user_service
    static_configs:
      - targets: ["user_service:8000"]
    metrics_path: /metrics

  - job_name: matching_service
    static_configs:
      - targets: ["matching_service:8000"]
    metrics_path: /metrics

  - job_name: ranking_service
    static_configs:
      - targets: ["ranking_service:8000"]
    metrics_path: /metrics

  - job_name: notification_service
    static_configs:
      - targets: ["notification_service:8000"]
    metrics_path: /metrics

  - job_name: bot_service
    static_configs:
      - targets: ["bot_service:8080"]
    metrics_path: /metrics
