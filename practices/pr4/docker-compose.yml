services:
  postgres:
    image: postgres:15-alpine
    container_name: pr4-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5435:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 2s
      timeout: 3s
      retries: 30

  runner:
    build: .
    container_name: pr4-runner
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: app
      PG_PASSWORD: app
      PG_DB: app
    volumes:
      - ./results:/app/results
    command: ["python", "run_all.py"]
