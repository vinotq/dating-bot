services:
  postgres:
    image: postgres:15-alpine
    container_name: pr3-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 2s
      timeout: 3s
      retries: 30
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M

  redis:
    image: redis:7-alpine
    container_name: pr3-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M

  runner:
    build: .
    container_name: pr3-runner
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: app
      PG_PASSWORD: app
      PG_DB: app
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./results:/app/results
    command: ["python", "run_tests.py"]
